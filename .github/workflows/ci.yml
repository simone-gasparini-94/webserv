name: Webserv CI/CD

# Trigger workflow
on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Install Test Dependencies
        run: sudo apt-get update && sudo apt-get install -y valgrind siege

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t webserv:1 .

      - name: Compile Unit Tests
        run: |
          cd tests
          make

      - name: Run Unit Tests
        run: |
          cd tests
          ./tester

      - name: Run Integration Test
        run: |
          # start server
          CONTAINER_ID=$(docker run -d --rm -p 8080:8080 webserv:1)

          # setup-time
          sleep 1

          # curl-test
          RESPONSE=$(curl -s http://localhost:8080/)

          # shut-down server
          docker stop $CONTAINER_ID

          # check response
          if [[ "$RESPONSE" !=  *"Hello from epoll"* ]]; then
            echo "Intergration Test Failed: Unexpected response -> $RESPONSE"
            exit 1
          fi

          echo "Integration Test Passed!"

      - name: Run Siege Test with Valgrind
        run: |
          # start server using valgrind
          valgrind --leak-check=full --error-exitcode=1 ./webserv conf-files/webserv.conf & SERVER_PID=$!

          # setup-time
          sleep 2

          # siege-test
          siege -c5 -r3 http://127.0.0.1:8080

          # shut-down server
          kill -SIGTERM $SERVER_PID

          # valgrind exit code
          wait $SERVER_PID
