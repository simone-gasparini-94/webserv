server {
    listen 80;
    listen 8080;
    
    location / {
        root /var/www/html;
    }
    
    location /api {
        root /var/www/api;
    }
}
server {
    listen 443;
    
    location / {
        root /var/www/html;
    }
    
    location /assets {
        root /var/www/assets;
    }
}
